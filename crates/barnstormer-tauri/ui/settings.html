<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Barnstormer Setup</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: rgba(255, 252, 247, 0.92);
        --ink: #1f2430;
        --muted: #646b76;
        --accent: #9d3c22;
        --line: rgba(31, 36, 48, 0.12);
      }

      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        background:
          radial-gradient(circle at top left, rgba(157, 60, 34, 0.15), transparent 30%),
          linear-gradient(135deg, #f6f0e4, #ece2d2);
        color: var(--ink);
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 24px;
        box-shadow: 0 20px 50px rgba(80, 55, 28, 0.08);
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.95rem;
      }

      input,
      select {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 11px 12px;
        font: inherit;
        background: rgba(255, 255, 255, 0.75);
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }

      #status {
        min-height: 1.25rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Connect a Provider</h1>
        <p>Barnstormer needs at least one model provider key before the desktop app can launch the embedded workspace.</p>
        <form id="settings-form">
          <label>
            Default provider
            <select id="default_provider" name="default_provider">
              <option value="anthropic">Anthropic</option>
              <option value="openai">OpenAI</option>
              <option value="gemini">Gemini</option>
            </select>
          </label>
          <label>
            Default model
            <input id="default_model" name="default_model" placeholder="Optional model override" />
          </label>
          <label>
            Anthropic API key
            <input type="password" autocomplete="off" spellcheck="false" id="anthropic_api_key" name="anthropic_api_key" placeholder="sk-ant-..." />
          </label>
          <label>
            Anthropic base URL
            <input id="anthropic_base_url" name="anthropic_base_url" placeholder="Optional proxy URL" />
          </label>
          <label>
            OpenAI API key
            <input type="password" autocomplete="off" spellcheck="false" id="openai_api_key" name="openai_api_key" placeholder="sk-..." />
          </label>
          <label>
            OpenAI base URL
            <input id="openai_base_url" name="openai_base_url" placeholder="Optional proxy URL" />
          </label>
          <label>
            Gemini API key
            <input type="password" autocomplete="off" spellcheck="false" id="gemini_api_key" name="gemini_api_key" placeholder="AIza..." />
          </label>
          <label>
            Gemini base URL
            <input id="gemini_base_url" name="gemini_base_url" placeholder="Optional proxy URL" />
          </label>
          <button type="submit">Save and Launch</button>
          <div id="status"></div>
        </form>
      </section>
    </main>
    <script src="./settings.js"></script>
  </body>
</html>
