<!-- ABOUTME: App shell with 2-column layout: nav rail + workspace. -->
<!-- ABOUTME: Loads fonts, HTMX, SSE extension, and SortableJS. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Agentic spec builder — collaborative specification management with an AI agent swarm and real-time web UI">
    <meta name="author" content="2389 Research, Inc.">
    <meta name="theme-color" content="#1a1a2e">
    <meta property="og:title" content="barnstormer — {% block og_title %}Spec Builder{% endblock %}">
    <meta property="og:description" content="Build software specs collaboratively with AI. A swarm of agents brainstorms, plans, and generates architecture diagrams in real time.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="barnstormer">
    <title>barnstormer — {% block title %}Spec Builder{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">

    <meta name="htmx-config" content='{"allowScriptTags":true}'>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <button class="hamburger" onclick="document.querySelector('.app-layout').classList.toggle('nav-open')" aria-label="Toggle navigation">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <nav class="nav-rail">{% block nav %}{% endblock %}</nav>
        <div class="nav-backdrop" onclick="document.querySelector('.app-layout').classList.remove('nav-open')"></div>
        <div class="workspace" id="workspace">{% block workspace %}{% endblock %}</div>
    </div>
    <script>
        // Close mobile nav drawer when a link inside it is clicked
        document.querySelector('.nav-rail').addEventListener('click', function(e) {
            if (e.target.closest('a')) {
                document.querySelector('.app-layout').classList.remove('nav-open');
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
