name: Release GUI

# Builds, signs, and notarizes the Tauri-based macOS desktop bundle and attaches
# the resulting DMG to the same GitHub release created by `release.yml`. Kept
# separate from the CLI release pipeline so Apple-signing churn never blocks
# the cross-platform CLI build.

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-tauri-macos:
    name: Build Signed Tauri macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install cargo-tauri
        run: cargo install tauri-cli --version '=2.11.1' --locked

      - name: Verify desktop crates
        run: |
          cargo test -p barnstormer-runtime --tests
          cargo test -p barnstormer-tauri --lib
          cargo check -p barnstormer-tauri

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm certificate.p12

      - name: Create App Store Connect API key file
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$APPLE_API_KEY_PATH"

          echo "APPLE_API_KEY=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"

      - name: Build Tauri desktop bundles
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: cargo tauri build --bundles app,dmg --target universal-apple-darwin --config crates/barnstormer-tauri/tauri.conf.json

      - name: Stage desktop release artifacts
        run: |
          mkdir -p release

          # Glob explicitly so an unexpected extra DMG (e.g. a future Sparkle
          # update DMG) fails loudly instead of being silently dropped.
          shopt -s nullglob
          dmg_paths=(target/universal-apple-darwin/release/bundle/dmg/*.dmg)
          shopt -u nullglob

          if [ "${#dmg_paths[@]}" -eq 0 ]; then
            echo "No Barnstormer.dmg produced by cargo tauri build" >&2
            exit 1
          fi
          if [ "${#dmg_paths[@]}" -gt 1 ]; then
            echo "Expected exactly one DMG, found ${#dmg_paths[@]}: ${dmg_paths[*]}" >&2
            exit 1
          fi

          cp "${dmg_paths[0]}" release/Barnstormer.dmg
          ls -la release

      - name: Notarize Barnstormer.dmg
        run: |
          set +e
          xcrun notarytool submit release/Barnstormer.dmg --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" --wait --output-format json > "$RUNNER_TEMP/notarytool-submit.json"
          SUBMISSION_STATUS="$?"
          set -e

          cat "$RUNNER_TEMP/notarytool-submit.json"

          SUBMISSION_ID="$(python3 -c 'import json, pathlib, sys; path = pathlib.Path(sys.argv[1]); print(json.load(path.open()).get("id", "") if path.exists() and path.stat().st_size else "")' "$RUNNER_TEMP/notarytool-submit.json")"
          if [ -n "$SUBMISSION_ID" ]; then
            echo "SUBMISSION_ID=$SUBMISSION_ID" >> "$GITHUB_ENV"
          fi

          if [ "$SUBMISSION_STATUS" -ne 0 ]; then
            exit "$SUBMISSION_STATUS"
          fi

          xcrun stapler staple release/Barnstormer.dmg

      - name: Retrieve notarization log on failure
        if: failure()
        run: |
          if [ -n "$SUBMISSION_ID" ]; then
            xcrun notarytool log "$SUBMISSION_ID" --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER"
          else
            echo "No notarization submission ID captured; skipping log retrieval."
          fi

      - name: Attach DMG to GitHub Release
        # Pinned to v3.0.0 SHA: this action runs against secrets and should
        # not silently float onto a newer tag. softprops/action-gh-release
        # upserts the release for the tag, so this coexists with the CLI
        # release job in release.yml that attaches the CLI binaries.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: release/Barnstormer.dmg

      - name: Clean up signing materials
        if: always()
        run: |
          rm -f "$APPLE_API_KEY_PATH"
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
