name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: barnstormer
            asset_name: barnstormer-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: barnstormer
            asset_name: barnstormer-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: barnstormer
            asset_name: barnstormer-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: barnstormer.exe
            asset_name: barnstormer-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  build-tauri-macos:
    name: Build Signed Tauri macOS App
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tauri
        run: cargo install tauri-cli --version '^2.0.0' --locked

      - name: Verify desktop crates
        run: |
          cargo test -p barnstormer-runtime --tests
          cargo test -p barnstormer-tauri --lib
          cargo check -p barnstormer-tauri

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm certificate.p12

      - name: Create App Store Connect API key file
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$APPLE_API_KEY_PATH"

          echo "APPLE_API_KEY=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"

      - name: Build Tauri desktop bundles
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: cargo tauri build --bundles app,dmg --config crates/barnstormer-tauri/tauri.conf.json

      - name: Stage desktop release artifacts
        run: |
          mkdir -p release

          DMG_PATH="$(find target/release/bundle -name '*.dmg' -print -quit)"
          if [ -z "$DMG_PATH" ]; then
            echo "No Barnstormer.dmg produced by cargo tauri build" >&2
            exit 1
          fi

          cp "$DMG_PATH" release/Barnstormer.dmg
          ls -la release

      - name: Notarize Barnstormer.dmg
        run: |
          set +e
          xcrun notarytool submit release/Barnstormer.dmg --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" --wait --output-format json > "$RUNNER_TEMP/notarytool-submit.json"
          SUBMISSION_STATUS="$?"
          set -e

          cat "$RUNNER_TEMP/notarytool-submit.json"

          SUBMISSION_ID="$(python3 -c 'import json, pathlib, sys; path = pathlib.Path(sys.argv[1]); print(json.load(path.open()).get("id", "") if path.exists() and path.stat().st_size else "")' "$RUNNER_TEMP/notarytool-submit.json")"
          if [ -n "$SUBMISSION_ID" ]; then
            echo "SUBMISSION_ID=$SUBMISSION_ID" >> "$GITHUB_ENV"
          fi

          if [ "$SUBMISSION_STATUS" -ne 0 ]; then
            exit "$SUBMISSION_STATUS"
          fi

          xcrun stapler staple release/Barnstormer.dmg

      - name: Retrieve notarization log on failure
        if: failure()
        run: |
          if [ -n "$SUBMISSION_ID" ]; then
            xcrun notarytool log "$SUBMISSION_ID" --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER"
          else
            echo "No notarization submission ID captured; skipping log retrieval."
          fi

      - name: Upload signed macOS desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: barnstormer-macos-desktop-dmg
          path: release/Barnstormer.dmg
          retention-days: 90

      - name: Clean up signing materials
        if: always()
        run: |
          rm -f "$APPLE_API_KEY_PATH"
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

  create-release:
    name: Create Release
    needs:
      - build-release
      - build-tauri-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download CLI release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: barnstormer-*
          path: artifacts/cli

      - name: Download desktop release artifact
        uses: actions/download-artifact@v4
        with:
          name: barnstormer-macos-desktop-dmg
          path: artifacts/desktop

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/cli/*/; do
            name=$(basename "$dir")
            if [[ "$name" == *"windows"* ]]; then
              cp "$dir"* "release/${name}"
            else
              cp "$dir"* "release/${name}"
              chmod +x "release/${name}"
            fi
          done

          cp artifacts/desktop/Barnstormer.dmg release/Barnstormer.dmg
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
